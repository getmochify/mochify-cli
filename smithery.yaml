startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "mochify.xyz API key. Without one, the free tier allows 25 images/day."
  commandFunction: |-
    config => ({
      command: 'mochify',
      args: ['serve'],
      env: config.apiKey ? { MOCHIFY_API_KEY: config.apiKey } : {}
    })
  exampleConfig:
    apiKey: ""
